<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/gyro-icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSM Studio</title>
    <style>
      html, body, #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(89, 166, 255, 0.2), transparent 36%),
          linear-gradient(180deg, #f4f9ff 0%, #edf4fb 52%, #e4eef7 100%);
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(560px, 100%);
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 24px 28px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(102, 144, 186, 0.18);
        box-shadow: 0 18px 60px rgba(40, 76, 119, 0.16);
        backdrop-filter: blur(14px);
      }

      .boot-mark {
        width: 64px;
        height: 64px;
        flex: 0 0 64px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: linear-gradient(145deg, #1a6ad6 0%, #60b1ff 100%);
        color: #fff;
        font: 700 1.1rem/1 "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.32);
      }

      .boot-copy {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .boot-title {
        color: #15314f;
        font: 700 1.15rem/1.2 "Segoe UI", sans-serif;
        letter-spacing: 0.01em;
      }

      .boot-subtitle {
        color: #54708d;
        font: 500 0.96rem/1.4 "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" data-capture-ignore="true">
        <div class="boot-card">
          <div class="boot-mark">JSM</div>
          <div class="boot-copy">
            <div class="boot-title">JSM Studio</div>
            <div class="boot-subtitle">Loading interface...</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
