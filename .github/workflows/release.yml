name: Release JSM Studio

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    defaults:
      run:
        working-directory: JSM_GUI/jsm_gui_tauri

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: JSM_GUI/jsm_gui_tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri installers
        run: npm run tauri:build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsm-studio-windows-installers
          path: |
            JSM_GUI/jsm_gui_tauri/src-tauri/target/release/bundle/nsis/*.exe
            JSM_GUI/jsm_gui_tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            JSM_GUI/jsm_gui_tauri/src-tauri/target/release/bundle/nsis/*.exe
            JSM_GUI/jsm_gui_tauri/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true
